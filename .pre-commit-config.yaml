exclude: '\.svg$'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # Allow the vendored model-viewer bundle (see src/app/src/renderer/vendor/README.md),
        # which is necessarily larger than 500 KB.
        exclude: ^src/app/src/renderer/vendor/model-viewer\.min\.js$

  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3
